<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Viewer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #222;
    }

    canvas {
      image-rendering: pixelated;
      width: min(80vw, 512px);
      height: auto;
      background: transparent;
    }

    .error {
      color: white;
      font-family: sans-serif;
      padding: 16px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    const hash = location.hash.slice(1);
    const parts = hash.split(":");

    if (parts.length !== 5 || parts[0] !== "v1") {
      document.body.innerHTML = '<div class="error">Invalid pixel data</div>';
      throw new Error("Invalid pixel data");
    }

    const width = Number(parts[1]);
    const height = Number(parts[2]);
    const palette = parts[3].split(",");
    const pixels = parts[4];

    if (!Number.isInteger(width) || !Number.isInteger(height) || pixels.length !== width * height) {
      document.body.innerHTML = '<div class="error">Invalid pixel size</div>';
      throw new Error("Invalid pixel size");
    }

    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");

    canvas.width = width;
    canvas.height = height;

    for (let y = 0; y < height; y++) {
      for (let x = 0; x < width; x++) {
        const index = parseInt(pixels[y * width + x], 36);
        const color = palette[index];

        if (!color || color === "transparent") {
          continue;
        }

        context.fillStyle = "#" + color;
        context.fillRect(x, y, 1, 1);
      }
    }
  </script>
</body>
</html>
